<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F8EF7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Фон: қою көк дөңгелек бұрышты шаршы -->
  <rect width="512" height="512" rx="110" ry="110" fill="#0F1729"/>

  <!-- Сумка контуры (gradient stroke) -->
  <path
    d="M156 210 Q152 195 160 185 L352 185 Q360 195 356 210 L336 360 Q332 380 310 382 L202 382 Q180 380 176 360 Z"
    fill="none"
    stroke="url(#grad2)"
    stroke-width="18"
    stroke-linejoin="round"
  />

  <!-- Сумка тұтқалары -->
  <path
    d="M210 185 Q210 135 256 130 Q302 135 302 185"
    fill="none"
    stroke="url(#grad2)"
    stroke-width="18"
    stroke-linecap="round"
  />

  <!-- Тұтқа бекіту нүктелері -->
  <circle cx="210" cy="185" r="10" fill="#60A5FA"/>
  <circle cx="302" cy="185" r="10" fill="#8B5CF6"/>

  <!-- Кітап сол бет -->
  <path
    d="M256 230 Q240 235 220 245 Q205 255 205 270 L205 355 Q205 365 215 360 Q235 350 256 345 Z"
    fill="white"
    opacity="0.95"
  />

  <!-- Кітап оң бет -->
  <path
    d="M256 230 Q272 235 292 245 Q307 255 307 270 L307 355 Q307 365 297 360 Q277 350 256 345 Z"
    fill="white"
    opacity="0.85"
  />

  <!-- Кітап ортасы (binding) -->
  <line x1="256" y1="230" x2="256" y2="345" stroke="url(#grad)" stroke-width="4" stroke-linecap="round"/>
</svg>
